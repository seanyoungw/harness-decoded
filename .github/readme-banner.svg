    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="rgba(139,92,246,0.07)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
