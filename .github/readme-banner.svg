  <text x="600" y="188" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#8b87a8" letter-spacing="0.06em">THE HARNESS &#183; NOT ONLY THE MODEL</text>
